services:
  app:
    build: .
    image: game-discovery-app
    container_name: game-discovery-app
    restart: unless-stopped
    env_file: .env
    networks:
      - web
      - db
    volumes:
      - storage:/app/storage/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build: .
    image: game-discovery-app
    container_name: game-discovery-scheduler
    restart: unless-stopped
    env_file: .env
    networks:
      - db
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'artisan schedule:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  queue:
    build: .
    image: game-discovery-app
    container_name: game-discovery-queue
    restart: unless-stopped
    env_file: .env
    networks:
      - db
    command: ["php", "artisan", "queue:work", "--tries=3", "--backoff=10"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'artisan queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  storage:

networks:
  web:
    external: true
  db:
    external: true
